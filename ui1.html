<!DOCTYPE html>
<html lang="zh-HK">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real-life Probability Distribution</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 620px;
            height: 100vh;
            max-height: 1080px;
            background: #f0f2f8;
            border: 12px solid #2a2a3a;
            border-radius: 48px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        
        .status-bar {
            height: 44px;
            background: #f0f2f8;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
            font-size: 14px;
        }
        
        #permission {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .card {
            background: #f0f3ff;
            width: 88%;
            max-width: 320px;
            border-radius: 20px;
            padding: 32px 26px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        
        .card h2 {
            font-size: 21px;
            margin-bottom: 10px;
        }
        
        .card p {
            font-size: 15.5px;
            line-height: 1.45;
            color: #333;
            margin-bottom: 28px;
        }
        
        button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background: linear-gradient(90deg, #5e7aff, #a45eff);
            border: none;
            border-radius: 9999px;
            cursor: pointer;
        }
        
        button:active {
            transform: scale(0.96);
        }
        
        #app {
            display: none;
            height: 100%;
            position: relative;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #info {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 15px;
            text-align: center;
            z-index: 10;
        }
        
        @media (max-width: 480px) {
            .phone-frame {
                border: 0;
                border-radius: 0;
                max-width: none;
                max-height: none;
            }
        }
    </style>
</head>

<body>

    <div class="phone-frame">
        <div id="permission">
            <div class="card">
                <h2>Camera Access</h2>
                <p>This app needs to use your camera.<br>Please tap Agree to continue.</p>
                <button id="agreeBtn">Agree</button>
            </div>
        </div>

        <div id="app">
            <div class="status-bar">9:41</div>
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="info">即時亮度分佈 • Gaussian Fit</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        document.getElementById('agreeBtn').addEventListener('click', async() => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment",
                        width: {
                            ideal: 1280
                        },
                        height: {
                            ideal: 720
                        }
                    }
                });
                video.srcObject = stream;
                document.getElementById('permission').style.display = 'none';
                document.getElementById('app').style.display = 'block';

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    requestAnimationFrame(draw);
                };
            } catch (err) {
                alert("無法開啟 camera: " + err.message);
            }
        });

        function draw() {
            if (!video.videoWidth) return requestAnimationFrame(draw);

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const brightness = [];
            for (let i = 0; i < data.length; i += 32) {
                const r = data[i],
                    g = data[i + 1],
                    b = data[i + 2];
                brightness.push(0.299 * r + 0.587 * g + 0.114 * b);
            }

            const bins = 50;
            const hist = new Array(bins).fill(0);
            brightness.forEach(v => {
                const bin = Math.floor((v / 255) * bins);
                if (bin >= 0 && bin < bins) hist[bin]++;
            });

            const maxCount = Math.max(...hist);
            const barWidth = canvas.width / bins;

            for (let i = 0; i < bins; i++) {
                const h = (hist[i] / maxCount) * (canvas.height * 0.6);
                ctx.fillStyle = `hsl(${i*5}, 90%, 65%)`;
                ctx.fillRect(i * barWidth, canvas.height - h, barWidth - 2, h);
            }

            ctx.beginPath();
            ctx.strokeStyle = '#ffeb3b';
            ctx.lineWidth = 4.5;
            for (let x = 0; x <= canvas.width; x += 4) {
                const t = x / canvas.width;
                const y = Math.exp(-Math.pow(t - 0.57, 2) / (2 * 0.23 * 0.23));
                const sy = canvas.height * 0.7 - y * canvas.height * 0.55;
                x === 0 ? ctx.moveTo(x, sy) : ctx.lineTo(x, sy);
            }
            ctx.stroke();

            ctx.fillStyle = 'white';
            ctx.font = 'bold 19px system-ui';
            ctx.fillText('Real-time Brightness Distribution', 25, 55);

            requestAnimationFrame(draw);
        }
    </script>
</body>

</html>
